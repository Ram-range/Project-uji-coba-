<!DOCTYPE html>
<html>
<head>
    <title>Kalkulator</title>
</head>
<body>
    <h1>Kalkulator Sederhana</h1>
    <p>Buka Console (F12) untuk lihat hasil</p>

    <script>
        let angka1 = prompt("Masukkan angka pertama:");
        let operator = prompt("Masukkan operator (+, -, *, /):");
        let angka2 = prompt("Masukkan angka kedua:");

        angka1 = Number(angka1);
        angka2 = Number(angka2);

        let hasil;

        if (operator === "+") {
            hasil = angka1 + angka2;
        } else if (operator === "-") {
            hasil = angka1 - angka2;
        } else if (operator === "*") {
            hasil = angka1 * angka2;
        } else if (operator === "/") {
            hasil = angka1 / angka2;
        } else {
            hasil = "Operator tidak valid!";
        }

        alert("Hasil: " + angka1 + " " + operator + " " + angka2 + " = " + hasil);
    </script>
</body>
</html>
